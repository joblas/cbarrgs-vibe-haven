<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="white">
  <!-- Ground line -->
  <line x1="30" y1="138" x2="190" y2="138" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Shopping cart body -->
  <g transform="translate(105, 70)">
    <!-- Cart basket -->
    <path d="M10,20 L5,55 L55,55 L65,20 Z" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
    <!-- Cart handle bar -->
    <line x1="65" y1="20" x2="80" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Cart wheels -->
    <circle cx="18" cy="62" r="6" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="18" cy="62" r="1.5" fill="white"/>
    <circle cx="48" cy="62" r="6" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="48" cy="62" r="1.5" fill="white"/>
  </g>

  <!-- Cbarrgs "C" character pushing the cart -->
  <g transform="translate(52, 42)">
    <!-- Spiky C body -->
    <!-- Main C crescent shape -->
    <path d="M45,50 C45,25 30,10 15,15 C0,20 -5,38 -2,55 C0,72 12,82 28,80 C38,78 45,70 45,60"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>

    <!-- Spikes radiating from the C -->
    <!-- Top spikes -->
    <line x1="20" y1="10" x2="18" y2="-2" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="8" x2="33" y2="-4" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="15" x2="4" y2="4" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="14" x2="48" y2="4" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Right spikes -->
    <line x1="46" y1="30" x2="56" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="45" x2="58" y2="46" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Bottom spikes -->
    <line x1="35" y1="80" x2="40" y2="90" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="84" x2="18" y2="94" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="78" x2="-2" y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Left spikes -->
    <line x1="-6" y1="40" x2="-16" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="58" x2="-15" y2="60" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Chain links from top of C -->
    <path d="M25,0 L28,-8 L32,-6 L29,-14 L33,-12 L30,-20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- "Arms" reaching toward cart handle -->
    <line x1="46" y1="38" x2="68" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="50" x2="68" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Hands gripping handle -->
    <circle cx="68" cy="32" r="2.5" fill="white"/>
    <circle cx="68" cy="36" r="2.5" fill="white"/>
  </g>
</svg>
