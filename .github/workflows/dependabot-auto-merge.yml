name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge if build passes
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.metadata.outputs.dependency-type }}
        run: |
          # Auto-merge all patch/minor updates (build already passed above)
          # Auto-merge major bumps for dev dependencies (won't affect production)
          # Flag major bumps for production dependencies for manual review
          if [ "$UPDATE_TYPE" != "version-update:semver-major" ]; then
            gh pr merge "$PR_URL" --merge --auto
          elif [ "$DEP_TYPE" = "direct:development" ]; then
            gh pr merge "$PR_URL" --merge --auto
          else
            gh pr comment "$PR_URL" --body "⚠️ Major version bump on a production dependency — needs manual review. Build passed but check for breaking API changes."
          fi
